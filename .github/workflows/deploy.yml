name: FE CI/CD Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Docker image 빌드
        run: docker build -t community-fe:ci .

  deploy:
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::209822909687:role/GitHubActions-FE-Deploy-Role
          aws-region: ap-northeast-2

      - name: 배포 대상 결정
        id: target
        run: |
          CURRENT_TG=$(aws elbv2 describe-rules \
            --listener-arn "${{ secrets.HTTPS_LISTENER_ARN }}" \
            --query 'Rules[?IsDefault==`true`].Actions[0].TargetGroupArn' \
            --output text)

          if [[ "$CURRENT_TG" == *"community-fe-green-tg"* ]]; then
            echo "color=blue" >> "$GITHUB_OUTPUT"
          else
            echo "color=green" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker 이미지 빌드
        run: |
          docker build \
            -t registry.ayelcommunity.site/community-fe:${{ github.sha }} .

      - name: Docker 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: registry.ayelcommunity.site
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 Push
        run: |
          docker push \
            registry.ayelcommunity.site/community-fe:${{ github.sha }}

      - name: ALB 트래픽 전환
        run: |
          bash scripts/switch-alb.sh \
            "${{ steps.target.outputs.color }}" \
            "${{ secrets.HTTPS_LISTENER_ARN }}"

      - name: ALB 트래픽 전환
        run: |
          bash scripts/switch-alb.sh \
            "${{ steps.target.outputs.color }}" \
            "${{ secrets.HTTPS_LISTENER_ARN }}"
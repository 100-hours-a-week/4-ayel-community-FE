name: FE CI/CD Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Docker image 빌드
        run: docker build -t community-fe:ci .

  deploy:
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::209822909687:role/GitHubActions-FE-Deploy-Role
          aws-region: ap-northeast-2

      - name: Docker 이미지 빌드
        run: |
          docker build \
            -t registry.ayelcommunity.site/community-fe:${{ github.sha }} .

      - name: Docker 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: registry.ayelcommunity.site
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 Push
        run: |
          docker push \
            registry.ayelcommunity.site/community-fe:${{ github.sha }}

      - name: FE Green 환경 배포
        run: |
          aws ssm send-command \
            --instance-ids "i-01d75fd54fbe9641a" "i-041f03685bee07ddd" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ssm-user/community-app/fe",
              "curl -fsSLO https://raw.githubusercontent.com/100-hours-a-week/4-ayel-community-FE/main/compose.blue.yml",
              "curl -fsSLO https://raw.githubusercontent.com/100-hours-a-week/4-ayel-community-FE/main/compose.green.yml",
              "mkdir -p scripts",
              "curl -fsSL -o scripts/deploy.sh https://raw.githubusercontent.com/100-hours-a-week/4-ayel-community-FE/main/scripts/deploy.sh",
              "bash scripts/deploy.sh ${{ github.sha }} green"
            ]'
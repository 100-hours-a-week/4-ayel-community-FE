name: FE CI/CD Pipeline

concurrency:
  group: community-fe-production
  cancel-in-progress: false

# main 대상 PR에서는 이미지 빌드 검증, main Push 및 Merge 시 이미지 생성 후 배포
on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:

      - name: 체크아웃
        uses: actions/checkout@v4


      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm


      - name: 의존성 설치
        run: npm ci


      - name: FE 검증
        run: |
          npm run lint
          npm run build

  build:
    needs: test
    # 실행 환경의 일관성을 위해 Ubuntu 버전 고정
    runs-on: ubuntu-24.04

    steps:
      # Runner에 현재 저장소의 코드를 가져옴
      - name: 체크아웃
        uses: actions/checkout@v4

      # Docker Buildx 빌드 환경 설정
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 레지스트리 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 빌드 캐시를 재사용하여 이미지를 빌드 후 main Push 시 레지스트리에 저장
      - name: Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ vars.REGISTRY }}/community-fe:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # 이미지 빌드 성공 후 배포 진행
    needs: build

    # PR에서는 배포하지 않고 main Push 시에만 배포
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-24.04

    steps:
      # 배포 스크립트를 사용하기 위해 코드를 가져옴
      - name: 체크아웃
        uses: actions/checkout@v4

      # GitHub Actions가 AWS 작업을 수행할 수 있도록 인증
      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # SSM을 통해 App EC2에 FE Blue Green 환경 배포
      - name: FE Blue Green 환경 배포
        run: |
          bash scripts/ssm-deploy.sh \
            "${{ github.sha }}" \
            "${{ vars.INSTANCE_A }}" \
            "${{ github.repository }}"
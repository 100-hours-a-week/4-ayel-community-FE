name: FE CI/CD Pipeline

# main 대상 PR에서는 이미지 빌드 검증, main Push 및 Merge 시 이미지 생성 후 배포
on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    # 실행 환경의 일관성을 위해 Ubuntu 버전 고정
    runs-on: ubuntu-24.04

    steps:
      # Runner에 현재 저장소의 코드를 가져옴
      - name: 체크아웃
        uses: actions/checkout@v4

      # Docker Buildx 빌드 환경 설정
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 레지스트리 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: registry.ayelcommunity.site
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 빌드 캐시를 재사용하여 이미지를 빌드 후 main Push 시 레지스트리에 저장
      - name: Docker 이미지 빌드 및 Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: registry.ayelcommunity.site/community-fe:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # 이미지 빌드 성공 후 배포 진행
    needs: build

    # PR에서는 배포하지 않고 main Push 시에만 배포
    if: github.event_name == 'push'

    permissions:
      contents: read

      # GitHub Actions가 AWS에 인증할 때 필요한 권한
      id-token: write

    runs-on: ubuntu-24.04

    steps:
      # 배포 스크립트를 사용하기 위해 코드를 가져옴
      - name: 체크아웃
        uses: actions/checkout@v4

      # GitHub Actions가 AWS 작업을 수행할 수 있도록 인증
      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      # 현재 Target Group을 확인하여 반대편을 다음 배포 대상으로 결정
      - name: 배포 대상 결정
        id: target
        run: |
          CURRENT_TG=$(aws elbv2 describe-listeners \
            --listener-arns "${{ vars.HTTPS_LISTENER_ARN }}" \
            --query 'Listeners[0].DefaultActions[0].TargetGroupArn' \
            --output text)

          # Green이 활성 상태이면 Blue, 아니면 Green을 배포 대상으로 지정
          if [[ "$CURRENT_TG" == *"community-fe-green-tg"* ]]; then
            echo "color=blue" >> "$GITHUB_OUTPUT"
          else
            echo "color=green" >> "$GITHUB_OUTPUT"
          fi

      # SSM을 통해 App EC2 2대의 비활성 환경에 새로운 FE 컨테이너 배포
      - name: FE Blue Green 환경 배포
        run: |
          bash scripts/ssm-deploy.sh \
            "${{ github.sha }}" \
            "${{ steps.target.outputs.color }}" \
            "${{ vars.INSTANCE_A }}" \
            "${{ vars.INSTANCE_C }}" \
            "${{ github.repository }}"

      # 새 Target Group의 Health Check 성공 후 Listener를 해당 Target Group으로 전환
      - name: FE ALB 전환
        run: |
          bash scripts/switch-alb.sh \
            "${{ steps.target.outputs.color }}" \
            "${{ vars.HTTPS_LISTENER_ARN }}"
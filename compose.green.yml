services:
  # FE Green 환경
  fe-green:
    # SHA를 이미지 태그로 사용
    image: registry.ayelcommunity.site/community-fe:${FE_IMAGE_TAG}

    # 컨테이너 종료 시 자동 재시작
    restart: unless-stopped

    # Green 환경 Host Port 81
    ports:
      - "81:3000"

    # 컨테이너 리소스 제한
    cpus: 0.25
    mem_limit: 128m

    # Green 환경 네트워크
    networks:
      - green_net

networks:
  # Green 환경 전용 네트워크
  green_net:
    driver: bridge